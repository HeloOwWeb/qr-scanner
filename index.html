<!DOCTYPE html>
<html>
  <head>
    <title>Scan QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  
  <body>
    <button id="startBtn">Démarrer scan</button>
    <button onclick="startScanner()">Scanner un autre QR</button>

    <div id="reader" style="width:300px;"></div>
    
    <p id="result">En attente...</p>
  
    <script>
      let scanner;
      const API_URL = "https://script.google.com/macros/s/AKfycbzyJg_d5a5FSaXK_My9l5VvlmiVQSowoIm4mcFiTAN7LqTEc8dvhzfbBPWWlMgazpgd/exec";

      function onScanSuccess(decodedText) {  
        // 🛑 STOP scanner immédiatement
        scanner.stop().then(() => {
          scanner.clear();
        });
        
        const url = API_URL + "?id=" + decodedText + "&t=" + new Date().getTime();
      
       fetch(url)
        .then(r => r.text())
        .then(t => {      
          const res = JSON.parse(t);
          const color = res.statut === "VALIDÉ" ? "green" : "red";
      
          if (!res || !res.statut) {
            document.getElementById("result").innerHTML = "❌ Réponse invalide";
            return;
          }
      
          if (res.statut === "INCONNU") {
            document.getElementById("result").innerHTML = "❌ Inconnu";
            return;
          }
      
          document.getElementById("result").innerHTML =
            "<b style='color:" + color + "'>" + res.statut + "</b><br>" +
            "Prof : " + (res.prof || "") + "<br>" +
            "Créneau : " + (res.debut || "") + " → " + (res.fin || "") + "<br>" +
            "Nom : " + (res.nom || "") + "<br>" +
            "Prénom : " + (res.prenom || "") + "<br>" +
            "Mineur ? : " + (res.mineur || "") + "<br>" +
            "Comment il repart du cours : " + (res.depart || "") + "<br>" +
            "Allergies : " + (res.allergies || "") + "<br>" +
            "Cas médical : " + (res.casmedicale || "") + "<br>" +
            "Contact en cas d'urgence : " + (res.telephone || "") + "<br>" +
            "Informations autres : " + (res.infos || "");
      
        })
        .catch(err => {
          document.getElementById("result").innerHTML =
            "❌ Erreur API : " + err;
        });
      }

      function startScanner() {
      
        document.getElementById("result").innerText = "📷 Démarrage caméra...";
      
        scanner = new Html5Qrcode("reader");
      
        const config = {
          fps: 10,
          qrbox: 250
        };
      
        scanner.start(
          { facingMode: { exact: "environment" } },   // 👈 caméra arrière
          config,
          (decodedText) => {
            onScanSuccess(decodedText);
          },
          (error) => {
            // erreurs de scan ignorées (normal)
          }
        ).then(() => {
          document.getElementById("result").innerText =
            "📷 Caméra arrière active";
        }).catch(err => {
          document.getElementById("result").innerText =
            "❌ Erreur caméra : " + err;
        });
      }
      
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("startBtn").addEventListener("click", startScanner);
      });
    </script>
  
  </body>
</html>
