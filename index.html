<!DOCTYPE html>
<html>
  <head>
    <title>Scan QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  
  <body>
    <button id="startBtn">Démarrer scan</button>

    <div id="reader" style="width:300px;"></div>
    
    <p id="result">En attente...</p>
  
    <script>
      let scanner;

      function startScanner() {
      
        document.getElementById("result").innerText = "📷 Démarrage caméra...";
      
        scanner = new Html5Qrcode("reader");
      
        const config = {
          fps: 10,
          qrbox: 250
        };
      
        scanner.start(
          { facingMode: { ideal: "environment" } },   // 👈 caméra arrière
          config,
          (decodedText) => {
            document.getElementById("result").innerText =
              "SCAN OK : " + decodedText;
          },
          (error) => {
            // erreurs de scan ignorées (normal)
          }
        ).then(() => {
          document.getElementById("result").innerText =
            "📷 Caméra arrière active";
        }).catch(err => {
          document.getElementById("result").innerText =
            "❌ Erreur caméra : " + err;
        });
      }
      
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("startBtn").addEventListener("click", startScanner);
      });
    </script>
  
  </body>
</html>
