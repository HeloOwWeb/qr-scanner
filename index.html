<!DOCTYPE html>
<html>
  <head>
    <title>Scan QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  
  <body>
    <h2>Scanner QR</h2>
  
    <div id="reader" style="width:300px;"></div>
  
    <p id="result">En attente...</p>
  
    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyrrTO7pFERcssM1ywPIbl2WvQp13OfkMlZVVS8pw3LsOsE6xkXB4ilv1cno8Py9Xjv/exec";
    
    function onScanSuccess(decodedText) {
    
      fetch(API_URL + "?id=" + decodedText)
        .then(r => r.json())
        .then(res => {
    
          let color = res.statut === "VALIDÉ" ? "green" : "red";
    
          document.getElementById("result").innerHTML =
            "<b style='color:" + color + "'>" + res.statut + "</b><br>" +
            "Nom : " + res.nom + "<br>" +
            "Prof : " + res.prof + "<br>" +
            "Créneau : " + res.debut + " → " + res.fin"<br>" +
            "Nom : " + res.nom + "<br>" +
            "Prénom : " + res.prenom + "<br>" +
            "Mineur ? : " + res.mineur + "<br>" +
            "Comment il repart du cours : " + res.depart + "<br>" +
            "Allergies : " + res.allergies + "<br>" +
            "Cas médicale : " + res.casmedicale + "<br>" +
            "Contact en cas d'urgence : " + res.telephone + "<br>" +
            "Informations autres : " + res.infos;
        });
    }
    
    const scanner = new Html5Qrcode("reader");
    
    Html5Qrcode.getCameras().then(devices => {
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    });
    </script>
  
  </body>
</html>
