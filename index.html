<!DOCTYPE html>
<html>
  <head>
    <title>Scan QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  
  <body>
    <h2>Scanner QR</h2>
  
    <div id="reader" style="width:300px;"></div>
  
    <p id="result">En attente...</p>
  
    <script>
      let scanner;

      function startScanner() {
      
        document.getElementById("result").innerText = "📷 Démarrage caméra...";
      
        scanner = new Html5Qrcode("reader");
      
        const config = {
          fps: 10,
          qrbox: 250
        };
      
        Html5Qrcode.getCameras().then(devices => {
      
          if (!devices || devices.length === 0) {
            document.getElementById("result").innerText = "❌ Aucune caméra détectée";
            return;
          }
      
          const cameraId = devices[0].id;
      
          scanner.start(
            cameraId,
            config,
            (decodedText) => {
              document.getElementById("result").innerText =
                "SCAN OK : " + decodedText;
            },
            (error) => {
              // on ignore les erreurs de scan continu
            }
          ).then(() => {
            document.getElementById("result").innerText = "📷 Caméra active";
          });
      
        }).catch(err => {
          document.getElementById("result").innerText =
            "❌ Erreur caméra : " + err;
        });
      }
      
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("startBtn").addEventListener("click", startScanner);
      });
    </script>
  
  </body>
</html>
