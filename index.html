<!DOCTYPE html>
<html>
  <head>
    <title>Scan QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  
  <body>
    <button id="startBtn">Démarrer scan</button>

    <div id="reader" style="width:300px;"></div>
    
    <p id="result">En attente...</p>
  
    <script>
      let scanner;
      const API_URL = "https://script.google.com/macros/s/AKfycbyPFTbA_XDIEqbD8D6evkzU6NwkkB955xYTDv6a1P19_RLEO30xeV-Rb9yyRHNnmBXX/exec";

      function onScanSuccess(decodedText) {  
        const url = API_URL + "?id=" + decodedText;
      
        fetch(url)
          .then(r => r.json())
          .then(res => {
      
            if (res.statut === "INCONNU") {
              document.getElementById("result").innerHTML = "❌ Inconnu";
              return;
            }
      
            const color = res.statut === "VALIDÉ" ? "green" : "red";
      
            document.getElementById("result").innerHTML =
              "<b style='color:" + color + "'>" + response.statut + "</b><br>" +
              "Prof : " + (response.prof || "") + "<br>" +
              "Créneau : " + (response.debut || "") + " → " + (response.fin || "") + "<br>" +
              "Nom : " + (response.nom || "") + "<br>" +
              "Prénom : " + (response.prenom || "") + "<br>" +
              "Mineur ? : " + (response.mineur || "") + "<br>" +
              "Comment il repart du cours : " + (response.depart || "") + "<br>" +
              "Allergies : " + (response.allergies || "") + "<br>" +
              "Cas médical : " + (response.casmedicale || "") + "<br>" +
              "Contact en cas d'urgence : " + (response.telephone || "") + "<br>" +
              "Informations autres : " + (response.infos || "");
          })
          .catch(err => {
            document.getElementById("result").innerHTML =
              "❌ Erreur API : " + err;
          });
      }

      function startScanner() {
      
        document.getElementById("result").innerText = "📷 Démarrage caméra...";
      
        scanner = new Html5Qrcode("reader");
      
        const config = {
          fps: 10,
          qrbox: 250
        };
      
        scanner.start(
          { facingMode: { exact: "environment" } },   // 👈 caméra arrière
          config,
          (decodedText) => {
            onScanSuccess(decodedText);
          },
          (error) => {
            // erreurs de scan ignorées (normal)
          }
        ).then(() => {
          document.getElementById("result").innerText =
            "📷 Caméra arrière active";
        }).catch(err => {
          document.getElementById("result").innerText =
            "❌ Erreur caméra : " + err;
        });
      }
      
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("startBtn").addEventListener("click", startScanner);
      });
    </script>
  
  </body>
</html>
